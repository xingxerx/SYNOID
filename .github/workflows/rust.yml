name: Rust

on:
  push:
    branches: [ "main", "claude/**" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # ── Rust toolchain (stable + clippy + rustfmt) ──────────────────────────
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    # ── Cargo build cache ───────────────────────────────────────────────────
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2

    # ── Node.js (required by build.rs for remotion-engine/) ─────────────────
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    # ── npm dependencies for remotion-engine ────────────────────────────────
    - name: Install remotion-engine npm dependencies
      working-directory: remotion-engine
      run: npm ci --ignore-scripts || npm install --ignore-scripts

    # ── System dependencies ─────────────────────────────────────────────────
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          pkg-config \
          libssl-dev \
          cmake \
          clang \
          libclang-dev \
          libglib2.0-dev \
          libasound2-dev \
          libjack-dev \
          portaudio19-dev \
          libxkbcommon-dev \
          libwayland-dev \
          libx11-dev \
          libxi-dev \
          libxrandr-dev \
          libxcursor-dev \
          libgtk-3-dev \
          libatk1.0-dev \
          libpango1.0-dev \
          libgdk-pixbuf2.0-dev \
          libxcb-render0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxcb-icccm4-dev \
          libxcb-keysyms1-dev \
          libxcb-randr0-dev \
          libxcb-composite0-dev \
          libxcb-cursor-dev \
          libfontconfig1-dev \
          ffmpeg

    # ── Format check ────────────────────────────────────────────────────────
    - name: Check formatting
      run: cargo fmt --all -- --check

    # ── Clippy lint ─────────────────────────────────────────────────────────
    - name: Clippy
      run: cargo clippy --all-targets -- -D warnings
      continue-on-error: true

    # ── Build ───────────────────────────────────────────────────────────────
    - name: Build
      run: cargo build --verbose

    # ── Test ────────────────────────────────────────────────────────────────
    - name: Run tests
      run: cargo test --verbose
