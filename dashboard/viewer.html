<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SYNOID // OMNI VIEWER</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/ag-psd@^14.0.0/dist/bundle.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        'crt-bg': '#050505',
                        'crt-green': '#00FF41',
                        'crt-green-dim': '#003B00',
                        'crt-teal': '#008080',
                    },
                    fontFamily: {
                        'mono': ['"IBM Plex Mono"', 'monospace'],
                    },
                },
            },
        }
    </script>
    <style>
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        @keyframes flicker { 
            0% { opacity: 0.98; } 50% { opacity: 0.96; } 100% { opacity: 0.98; } 
        }
        
        body {
            background-color: #050505;
            color: #00FF41;
            font-family: 'IBM Plex Mono', monospace;
            overflow: hidden;
            animation: flicker 0.15s infinite;
            position: relative;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 101;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 255, 65, 0.03) 50%, rgba(0, 0, 0, 0) 100%);
            position: fixed; bottom: 100%; animation: scanline 12s linear infinite;
            pointer-events: none;
        }

        .crt-border { border: 1px solid #00FF41; position: relative; background: rgba(0, 59, 0, 0.05); }
        .crt-label { position: absolute; top: -10px; left: 10px; background: #050505; padding: 0 5px; font-size: 10px; text-transform: uppercase; font-weight: bold; color: #00FF41; }
    </style>
</head>

<body class="p-4 h-screen flex flex-col">
    <div class="scanline"></div>

    <!-- Header -->
    <header class="h-16 border-b border-crt-green flex items-center justify-between px-4 mb-4">
        <div class="flex items-center gap-4">
            <a href="/" class="p-1 border border-crt-green hover:bg-crt-green hover:text-black transition-all">
                <span class="text-xs font-bold px-2 uppercase">&lt; BACK</span>
            </a>
            <h1 class="text-lg font-bold tracking-tighter uppercase flex items-center gap-2">
                <span class="text-crt-teal">Omni_Viewer</span>
                <span class="text-[10px] opacity-50">// Multi-Format Inspector</span>
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="file-name" class="text-[10px] text-crt-amber font-bold border border-crt-amber px-2 py-0.5">NO_FILE_LOADED</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 relative overflow-hidden" id="drop-zone">

        <!-- Canvas Container -->
        <div class="crt-border w-full h-full flex items-center justify-center p-4" id="canvas-container">
            <span class="crt-label">Visual Matrix Output</span>
            <div class="text-center cursor-pointer group" id="empty-state">
                <div class="mb-4 inline-block p-4 border border-crt-green border-dashed group-hover:bg-crt-green group-hover:bg-opacity-10 transition-all">
                    <span class="text-4xl">▣</span>
                </div>
                <p class="text-sm font-bold uppercase tracking-widest group-hover:text-white transition-all">Engage Input Stream</p>
                <p class="text-[10px] mt-2 opacity-50 uppercase">Drag & Drop Image or PSD Module</p>
                <p class="text-[9px] mt-1 text-crt-teal opacity-70">JPG / PNG / WEBP / PSD / PSB</p>
            </div>
            <canvas id="viewer-canvas" class="hidden shadow-neon max-w-full max-h-full border border-crt-green"></canvas>
        </div>

    </main>

    <!-- Footer -->
    <footer class="mt-4 border-t border-crt-green pt-2 text-[9px] font-bold uppercase flex justify-between">
        <div>SYNOID.Viewer_Process // PORTAL_ACTIVE</div>
        <div class="text-crt-teal">STATUS: READY_V1.0</div>
    </footer>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.psd,.psb,.png,.jpg,.jpeg,.webp';
        fileInput.style.display = 'none';
        document.body.appendChild(fileInput);

        const canvas = document.getElementById('viewer-canvas');
        const ctx = canvas.getContext('2d');
        const emptyState = document.getElementById('empty-state');
        const fileNameDisplay = document.getElementById('file-name');

        // Drag & Drop Handlers
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-crt-green', 'bg-opacity-5');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('bg-crt-green', 'bg-opacity-5');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-crt-green', 'bg-opacity-5');
            const files = e.dataTransfer.files;
            if (files.length > 0) processFile(files[0]);
        });

        dropZone.addEventListener('click', () => {
            if (canvas.classList.contains('hidden')) {
                fileInput.click();
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) processFile(e.target.files[0]);
        });

        async function processFile(file) {
            fileNameDisplay.textContent = file.name.toUpperCase();
            fileNameDisplay.classList.remove('border-crt-amber', 'text-crt-amber');
            fileNameDisplay.classList.add('border-crt-green', 'text-crt-green');

            if (file.name.toLowerCase().endsWith('.psd') || file.name.toLowerCase().endsWith('.psb')) {
                renderPSD(file);
            } else {
                renderImage(file);
            }
        }

        function renderImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    showCanvas();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function renderPSD(file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const buffer = e.target.result;
                try {
                    const psd = agPsd.readPsd(buffer, { useCanvas: true });
                    if (psd.canvas) {
                        canvas.width = psd.width;
                        canvas.height = psd.height;
                        ctx.drawImage(psd.canvas, 0, 0);
                        showCanvas();
                    }
                } catch (err) {
                    console.error(err);
                    alert("KERNEL_ERROR: Failed to parse PSD structure\n" + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function showCanvas() {
            canvas.classList.remove('hidden');
            emptyState.classList.add('hidden');
            document.getElementById('canvas-container').style.backgroundColor = 'transparent';
        }
    </script>
</body>

</html>
